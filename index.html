.top .week{color:var(--muted);font-size:12px;letter-spacing:.14em;font-weight:600;}
.topright{display:flex;align-items:center;gap:14px;}
.themebtn{border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:8px;width:32px;height:27px;font-size:14px;cursor:pointer;line-height:1;transition:background .12s;}
.themebtn:hover{background:var(--surface2);}

/* tooltips (Edu-Layer) */
.tip{position:relative;border-bottom:1px dotted var(--muted);cursor:help;}
.tip .tt{visibility:hidden;opacity:0;position:absolute;left:0;top:140%;z-index:8;background:#1c2530;color:#fff;
  font-size:11px;font-weight:500;line-height:1.45;letter-spacing:0;text-transform:none;padding:8px 10px;border-radius:8px;width:210px;box-shadow:0 8px 22px rgba(0,0,0,.22);transition:opacity .15s;pointer-events:none;}

.hero{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-bottom:0;}
.topgrid{display:grid;grid-template-columns:minmax(300px,360px) 1fr;gap:11px;align-items:stretch;margin-bottom:11px;}
.topgrid .kurs{margin-bottom:0;}
.hero .col:nth-child(4){border-left:0;}
.hero .col:nth-child(n+4){border-top:1px solid var(--line);}
@media(max-width:900px){.topgrid{grid-template-columns:1fr;}}
.kurs{display:flex;align-items:center;gap:22px;}
.compass-wrap{flex:0 0 auto;}
.compass{width:76px;height:76px;display:block;}
.compass-ring{fill:none;stroke:var(--line);stroke-width:2;}
.compass-tick{stroke:var(--muted);stroke-width:2;stroke-linecap:round;opacity:.55;}
.needle-center{fill:var(--ink);}
.rose-arm{fill:var(--muted);opacity:.4;}
.compass-rot{transform-origin:50px 50px;transition:transform .8s cubic-bezier(0.34,1.56,0.64,1);}
.compass-wob{transform-origin:50px 50px;transition:transform .35s ease;}
.compass:hover .compass-wob{transform:rotate(3deg);}
.kurs-txt{flex:1;min-width:0;}
.kurs-lbl{font-size:23px;font-weight:800;letter-spacing:-.01em;line-height:1.1;}
.kurs-status{font-size:14px;margin-top:5px;color:var(--ink);}
.kurs-mot{font-size:12.5px;color:var(--muted);margin-top:4px;}

.kurs-today .t-btn:hover{filter:brightness(1.08);}
.kurs-ready{display:flex;flex-wrap:wrap;gap:13px;margin-top:7px;font-size:11.5px;color:var(--muted);}

.kurs-ready .rd b{color:var(--ink);font-weight:700;}
.kurs-ready .rd small{color:var(--muted);font-size:9.5px;margin-left:2px;}
.kurs-ready .rd .dot{margin-right:2px;}
.rtoggle{display:flex;gap:6px;margin-bottom:8px;}
.rt{padding:3px 11px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.rt.active{background:var(--card);color:var(--ink);border-color:var(--link);}
@media (max-width:680px){.kurs{gap:14px;}.compass{width:64px;height:64px;}.kurs-lbl{font-size:19px;}}

.hero .col:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(22,32,43,.07);}
.hero .lbl{font-size:11px;letter-spacing:.1em;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:6px;min-height:14px;}

.pill.good{background:var(--pg-bg);color:var(--pg-fg);} .pill.warn{background:var(--pw-bg);color:var(--pw-fg);} .pill.bad{background:var(--pb-bg);color:var(--pb-fg);} .pill.grey{background:var(--pgr-bg);color:var(--pgr-fg);}

.grid{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;}

.entry{border-left:3px solid var(--muted);padding:3px 0 3px 7px;margin:6px 0;display:block;text-decoration:none;color:var(--ink);border-radius:0 4px 4px 0;cursor:pointer;}

.entry .eh .plan{color:var(--muted);font-weight:600;letter-spacing:0;font-style:italic;}

.badge{margin-left:auto;width:17px;height:17px;border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.entry .nm{font-size:12.5px;font-weight:600;margin:2px 0;line-height:1.25;}

.entry .si b{color:var(--ink);font-weight:600;}

.gc.st-done{background:rgba(46,158,79,.10);}
.gc.st-miss{background:rgba(216,58,52,.07);}

.foot{margin-top:auto;border-top:1px dashed var(--line);padding-top:6px;font-size:10.5px;color:var(--muted);line-height:1.6;}

.wk{padding:11px 12px;}

  <div class="top">
    <div class="brand"><b>C<span class="brand-o" id="brandO"></span>MPASS</b><span class="sep up">· INTERVALS<span class="icu">.ICU</span> · GUN</span></div>
    <div class="topright"><span class="wxchip" id="wxchip" data-wx="1" tabindex="0" role="button" title="Wetter — Stundenverlauf"></span><button class="themebtn" id="themebtn" title="Hell/Dunkel umschalten">◐</button><div class="week up mono" id="topweek">—</div></div>

<script>
const API="https://intervals.icu/api/v1";
const ATHLETE="i183972";
let KEY=localStorage.getItem("loop_icu_key")||"";
const ANCHOR_W=290, ANCHOR_10K_PACE=272, CP_FALLBACK=290, WEEK_GOAL_KM=39, BASE_CTL_TARGET=32, RACE_CTL_FALLBACK=50;

const MON=["Jan","Feb","März","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const DOW=["MO","DI","MI","DO","FR","SA","SO"];
const RUNTYPES=["Run","VirtualRun","TrailRun"];
const ENDUR=["Run","VirtualRun","TrailRun","Ride","VirtualRide","GravelRide","MountainBikeRide","Swim","OpenWaterSwim","Rowing"];

// Ein Band (top/mid) eines Tages: paart absolvierte mit geplanten Einheiten zu einer Kachel
function dayBand(da,de,band,isPast){
  const dts=da.filter(a=>a._meta.band===band), pls=de.filter(e=>e._meta.band===band);
  const used=new Set(); let html="",anyDone=false,anyMiss=false;
  pls.forEach(ev=>{
    let act=dts.find(a=>!used.has(a)&&a.paired_event_id&&(""+a.paired_event_id===""+(ev.id||ev.event_id)));
    if(!act)act=dts.find(a=>!used.has(a)&&a._meta.lbl===ev._meta.lbl);
    if(act){used.add(act);anyDone=true;html+=comboHTML(act,ev);}
    else{const miss=isPast;if(miss)anyMiss=true;html+=entryHTML(ev,"plan",miss);}
  });
  dts.forEach(a=>{if(!used.has(a)){anyDone=true;html+=entryHTML(a,"done");}});
  return {html,anyDone,anyMiss,hasPlan:pls.length>0};
}

  const actLoadWk={}; (acts16||[]).forEach(a=>{const k=(a.start_date_local||"").slice(0,10);if(k){const wk=isoWeek(new Date(k));actLoadWk[wk]=(actLoadWk[wk]||0)+(a.icu_training_load||0);}});
  const tgtLoadWk={}; (evsTargets||[]).forEach(e=>{const k=(e.start_date_local||"").slice(0,10);if(k)tgtLoadWk[isoWeek(new Date(k))]=e.load_target||0;});
  let kursStreak=0;
  for(let i=1;i<=20;i++){const ws=new Date(mon);ws.setDate(ws.getDate()-i*7);const wk=isoWeek(ws);const t=tgtLoadWk[wk];if(!t)continue;if((actLoadWk[wk]||0)>=0.8*t)kursStreak++;else break;}
  const complPct=planLoad>0?Math.round(istLoad/planLoad*100):null;
  const kursMot=kursOff<0.17?"Alles im grünen Bereich – zieh dein Ding durch.":kursOff<0.4?"Kleine Abweichung – heute bewusst steuern.":"Erholung/Last prüfen – ggf. Veto ziehen.";
  function compassSVG(angle,col,o){o=o||{};
    const glow=o.glow?`;filter:drop-shadow(0 0 5px ${col})`:"";
    const r=o.thin?38:40, rw=o.thin?2.5:18;
    let ticks="";
    if(o.ticks){let t="";for(let i=0;i<12;i++)t+=`<line x1="50" y1="3.5" x2="50" y2="9.5" transform="rotate(${i*30} 50 50)"/>`;
      ticks=`<g stroke="${col}" stroke-width="2" stroke-linecap="round" opacity="0.6">${t}</g>`;}
    return `<svg viewBox="0 0 100 100" class="${o.cls||'compass'}" role="img" aria-label="Kurs">
      <circle cx="50" cy="50" r="${r}" fill="none" stroke="${col}" stroke-width="${rw}" opacity="0.9"/>
      ${ticks}
      <g class="compass-rot" style="transform:rotate(${angle}deg);transform-origin:50px 50px${glow}"><g class="compass-wob" style="transform-origin:50px 50px">
        <polygon points="50,24 66,70 50,58 34,70" fill="${col}"/>
      </g></g>
    </svg>`;
  }
  const _missV=[];if(cur.hrv==null)_missV.push("HRV");if(cur.restingHR==null)_missV.push("RHR");
  const vitalsHint=_missV.length?`<div class="kurs-meta" style="color:var(--warn);margin-top:5px">⚠ Heute noch keine ${_missV.join(" & ")}-Daten — Garmin Connect ggf. noch nicht synchronisiert.</div>`:"";
  const kursHero=`<div class="card kurs">
    <div class="compass-wrap">${compassSVG(kursAngle,kursCol,{glow:true,thin:true,ticks:true})}</div>
    <div class="kurs-txt">
      <div class="kurs-lbl" style="color:${kursCol}">${kursLbl}${kursAngle?` · ${kursAngle}° ab Nord`:""}</div>
      <div class="kurs-status">${readyState==='good'?'⚪':readyState==='warn'?'🟡':'🔴'} ${readyState==='good'?'Bereit':readyState==='warn'?'Beobachten':'Vorsicht'}</div>
      ${todayCmd}
      ${rdHTML}
      ${vitalsHint}
      <div class="kurs-mot">${todayDone?'Einheit im Kasten ✓ – ':''}${kursMot}</div>
      <div class="kurs-meta">${kursStreak>0?`🔥 ${kursStreak} Wo. in Folge im Plan · `:""}Diese Woche ${complPct!=null?complPct+"% der Wochenlast":istLoad+" Load"}</div>
    </div></div>`;
  if(wx&&wx.daily&&wx.current){
    const tmax=Math.round(wx.daily.temperature_2m_max[0]), tmin=Math.round(wx.daily.temperature_2m_min[0]), code=wx.current.weather_code;
    const feelsMax=(wx.hourly&&wx.hourly.apparent_temperature)?Math.round(Math.max(...wx.hourly.apparent_temperature)):Math.round(wx.current.apparent_temperature);
    const amp=feelsMax>=32?"wx-red":(feelsMax>=28?"wx-amber":(tmax<=2?"wx-blue":"wx-green"));
    const _wc=document.getElementById("wxchip");
    if(_wc){_wc.className="wxchip "+amp;_wc.innerHTML=`${wxIcon(code)} ${tmax}°<small>/${tmin}°</small>`;}
  } else { const _wc=document.getElementById("wxchip"); if(_wc)_wc.style.display="none"; }
  function openWeatherModal(){
    if(!wx||!wx.hourly)return;
    const H=wx.hourly, n=H.time.length, nowH=new Date().getHours();
    let rows="";
    for(let i=0;i<n;i++){
      const hr=+H.time[i].slice(11,13);
      if(hr<nowH-1)continue;
      if(hr%2!==0&&hr!==nowH)continue;
      const t=Math.round(H.temperature_2m[i]),f=Math.round(H.apparent_temperature[i]),w=Math.round(H.wind_speed_10m[i]),p=H.precipitation_probability?H.precipitation_probability[i]:0,c=H.weather_code[i];
      rows+=`<tr><td class="wt">${String(hr).padStart(2,"0")}:00</td><td class="c">${wxIcon(c)}</td><td>${t}°<span style="color:var(--muted)"> (${f}°)</span></td><td>${w} km/h</td><td>${p}%</td><td style="color:var(--muted)">${wxDesc(c)}</td></tr>`;
    }
    document.body.insertAdjacentHTML("beforeend",`<div class="modal" id="wxmodal"><div class="mbox"><button class="mclose" id="wxclose" aria-label="Schließen">×</button><h3>Wetter Essen — heute</h3><div class="ms">Stundenverlauf (Open-Meteo) · Temp (gefühlt) · Wind · Regenwahrscheinlichkeit</div><table class="wxh"><thead><tr><th>Zeit</th><th></th><th>°C (gef.)</th><th>Wind</th><th>Regen</th><th>Wetter</th></tr></thead><tbody>${rows}</tbody></table></div></div>`);
    const close=()=>{const x=document.getElementById("wxmodal");if(x)x.remove();document.removeEventListener("keydown",esc);};
    function esc(e){if(e.key==="Escape")close();}
    document.addEventListener("keydown",esc);
    document.getElementById("wxmodal").onclick=e=>{if(e.target.id==="wxmodal")close();};
    document.getElementById("wxclose").onclick=close;
  }
  document.getElementById("app").innerHTML=`<div class="topgrid">${kursHero}${hero}</div>`+
    consHTML+predHTML+`<div class="grid">${ghead}<div class="grow body">${cells}</div></div>`;
  document.getElementById("footl").textContent="Verbunden mit intervals.icu · Gun · Stand "+pad(today.getHours())+":"+pad(today.getMinutes());

  if(chart)chart.destroy(); if(chart2){chart2.destroy();chart2=null;} if(chart3){chart3.destroy();chart3=null;} if(chart4){chart4.destroy();chart4=null;}
  chart=new Chart(document.getElementById("cons"),{type:"bar",
    data:{labels:wkLabels,datasets:[
      {label:"Basis (Z1/Z2)",data:wkBasis,backgroundColor:C_BASE,borderRadius:2,stack:"km",order:3},
      {label:"Intensität (Z3+)",data:wkInten,backgroundColor:C_INTEN,borderRadius:2,stack:"km",order:3},
      {type:"line",label:"Ziel (Plan)",data:wkGoalKm,borderColor:C_LINE,borderDash:[6,4],borderWidth:2,pointRadius:0,order:1}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},
      plugins:{legend:{display:true,labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:c=>{if(c.dataset.type==="line")return "Ziel: "+c.parsed.y+" km";const tot=(wkBasis[c.dataIndex]||0)+(wkInten[c.dataIndex]||0);const pct=tot>0?Math.round(c.parsed.y/tot*100):0;return c.dataset.label+": "+c.parsed.y+" km ("+pct+"% der Zeit)";}}}},
      scales:{y:{beginAtZero:true,stacked:true,title:{display:true,text:"km"},grid:{color:GRID}},x:{stacked:true,grid:{display:false},ticks:{font:{size:10}}}}}});

  // CTL/TSB-Serie (16 Wochen, täglich)
  const start112=new Date(sun);start112.setDate(start112.getDate()-111);const startK=ymd(start112);
  const ser=wsorted.filter(w=>{const k=wkey(w);return k>=startK&&k<=todayKey;});
  const sLab=ser.map(w=>{const k=wkey(w);return k.slice(8,10)+"."+k.slice(5,7);});
  const sCtl=ser.map(w=>+(w.ctl||0).toFixed(1));
  const sTsb=ser.map(w=>+(((w.ctl||0)-(w.atl||0))).toFixed(1));
  let c2range="micro";
  function buildChart2(){
    const n=c2range==="micro"?Math.min(21,sLab.length):sLab.length;
    const L=sLab.slice(-n),Ct=sCtl.slice(-n),Tb=sTsb.slice(-n);
    if(chart2){chart2.destroy();chart2=null;}
    chart2=new Chart(document.getElementById("ctltsb"),{type:"line",
      data:{labels:L,datasets:[
        {label:"Fitness (CTL)",data:Ct,borderColor:"#2f6fb0",borderWidth:2,tension:0.4,pointRadius:0,yAxisID:"y"},
        {label:"Form (TSB)",data:Tb,borderColor:"rgba(0,0,0,0)",pointRadius:0,yAxisID:"y1",fill:{target:"origin",above:C_TSBF,below:C_TSBT}},
        {label:"_zero",data:Tb.map(()=>0),yAxisID:"y1",borderColor:"rgba(138,152,168,.7)",borderDash:[5,4],borderWidth:1,pointRadius:0,fill:false,order:0}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},
        plugins:{legend:{display:true,labels:{boxWidth:12,font:{size:11},filter:i=>i.text!=="_zero"}},tooltip:{filter:t=>t.dataset.label!=="_zero"}},
        scales:{y:{position:"left",title:{display:true,text:"CTL"},grid:{color:GRID}},
          y1:{position:"right",title:{display:true,text:"TSB"},grid:{drawOnChartArea:false}},
          x:{grid:{display:false},ticks:{font:{size:10},autoSkip:true,maxTicksLimit:9}}}}});
  }
  function buildChart3(){
    chart3=new Chart(document.getElementById("vertc"),{type:"bar",
      data:{labels:wkLabels,datasets:[
        {label:"Höhenmeter",data:wkElev,backgroundColor:"#c2691c",borderRadius:2,yAxisID:"y",order:2},
        {type:"line",label:"GAP (Ø)",data:wkGap,borderColor:"#2f6fb0",borderWidth:1.5,tension:.3,pointRadius:0,spanGaps:true,yAxisID:"y1",order:1}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},
        plugins:{legend:{display:true,labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:c=>{if(c.dataset.label==="GAP (Ø)")return c.parsed.y==null?null:"GAP: "+paceVerbal(c.parsed.y);if(c.dataset.label==="Ziel Höhenmeter")return c.parsed.y==null?null:"Ziel: "+c.parsed.y+" m";return "Höhenmeter: "+c.parsed.y+" m";}}}},
        scales:{y:{beginAtZero:true,position:"left",title:{display:true,text:"Höhenmeter"},grid:{color:GRID}},
          y1:{position:"right",reverse:true,title:{display:true,text:"GAP"},grid:{drawOnChartArea:false},ticks:{callback:v=>secPace(v)+"/km"}},
          x:{grid:{display:false},ticks:{font:{size:10}}}}}});
  }
  function buildChart4(){
    const s42=new Date(sun);s42.setDate(s42.getDate()-41);const s42K=ymd(s42);
    const rs=wsorted.filter(w=>{const k=wkey(w);return k>=s42K&&k<=todayKey;});
    const rl=rs.map(w=>{const k=wkey(w);return k.slice(8,10)+"."+k.slice(5,7);});
    const slpCol=s=>s==null?"rgba(127,140,155,.35)":s>=90?"#3fa34d":s>=80?"#7fb069":s>=70?"#e0a03a":"#d1495b";
    const qLbl={1:"GREAT",2:"GOOD",3:"AVG",4:"POOR"};
    chart4=new Chart(document.getElementById("recov"),{type:"bar",
      data:{labels:rl,datasets:[
        {type:"bar",label:"Schlaf (h)",data:rs.map(w=>w.sleepSecs?+(w.sleepSecs/3600).toFixed(2):null),backgroundColor:rs.map(w=>slpCol(w.sleepScore)),borderRadius:2,yAxisID:"ys",order:3},
        {type:"line",label:"HRV (ms)",data:rs.map(w=>w.hrv!=null?w.hrv:null),borderColor:"#2f6fb0",borderWidth:2,tension:.3,pointRadius:0,spanGaps:true,yAxisID:"yhr",order:1},
        {type:"line",label:"RHR (bpm)",data:rs.map(w=>w.restingHR!=null?w.restingHR:null),borderColor:"#d1495b",borderWidth:2,tension:.3,pointRadius:0,spanGaps:true,yAxisID:"yhr",order:1}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},
        plugins:{legend:{display:true,labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:c=>{if(c.dataset.label==="Schlaf (h)"){const w=rs[c.dataIndex];return "Schlaf: "+(c.parsed.y!=null?c.parsed.y.toFixed(1)+" h":"–")+(w.sleepScore!=null?" · Score "+w.sleepScore:"")+(w.sleepQuality?" · "+(qLbl[w.sleepQuality]||w.sleepQuality):"");}return c.dataset.label+": "+(c.parsed.y!=null?c.parsed.y:"–");}}}},
        scales:{ys:{position:"left",beginAtZero:true,suggestedMax:10,title:{display:true,text:"Schlaf (h)"},grid:{color:GRID}},
          yhr:{position:"right",suggestedMin:30,title:{display:true,text:"HRV ms / RHR bpm"},grid:{drawOnChartArea:false}},
          x:{grid:{display:false},ticks:{font:{size:10},autoSkip:true,maxTicksLimit:10}}}}});
  }
  document.querySelectorAll(".tb").forEach(b=>b.onclick=()=>{
    const t=b.dataset.t;
    document.getElementById("tab-cons").style.display=t==="cons"?"block":"none";
    document.getElementById("tab-form").style.display=t==="form"?"block":"none";
    document.getElementById("tab-vert").style.display=t==="vert"?"block":"none";
    document.getElementById("tab-recov").style.display=t==="recov"?"block":"none";
    document.querySelectorAll(".tb").forEach(x=>x.classList.toggle("active",x.dataset.t===t));
    if(t==="form"){ if(!chart2)buildChart2(); else chart2.resize(); }
    else if(t==="vert"){ if(!chart3)buildChart3(); else chart3.resize(); }
    else if(t==="recov"){ if(!chart4)buildChart4(); else chart4.resize(); }
    else { chart.resize(); }
  });

  function openPredModal(dist,label){
    document.body.insertAdjacentHTML("beforeend",`<div class="modal" id="pmodal"><div class="mbox"><button class="mclose" id="pmclose">Schließen</button><h3>${label} — Prognose-Verlauf</h3><div class="ms">Prognostizierte Zielzeit über 16 Wochen, gekoppelt an die eFTP-Entwicklung. Linie steigt = schneller.</div><div class="mc"><canvas id="pmc"></canvas></div></div></div>`);
    const data=wkEftp.map(ef=>ef?+predTimeFor(dist,ef).toFixed(0):null);
    new Chart(document.getElementById("pmc"),{type:"line",data:{labels:wkLabels,datasets:[{label:label,data:data,borderColor:"#2f6fb0",borderWidth:2,tension:.3,pointRadius:0,pointHoverRadius:4,spanGaps:true,fill:false}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},plugins:{legend:{display:false},tooltip:{callbacks:{title:c=>c[0].label,label:c=>secTime(c.parsed.y)}}},
        scales:{y:{reverse:true,title:{display:true,text:"Zielzeit"},ticks:{callback:v=>secTime(v)},grid:{color:GRID}},x:{grid:{display:false},ticks:{font:{size:10},autoSkip:true,maxTicksLimit:8}}}}});
    function close(){const m=document.getElementById("pmodal");if(m)m.remove();document.removeEventListener("keydown",esc);}
    function esc(e){if(e.key==="Escape")close();}
    document.addEventListener("keydown",esc);
    document.getElementById("pmodal").onclick=e=>{if(e.target.id==="pmodal")close();};
    document.getElementById("pmclose").onclick=close;
  }
  function openVo2Modal(){
    document.body.insertAdjacentHTML("beforeend",`<div class="modal" id="v2modal"><div class="mbox"><button class="mclose" id="v2close">Schließen</button><h3>VO₂max — Verlauf</h3><div class="ms">Geschätzte VO₂max (ml/kg/min) über die Zeit. Steigend = wachsende aerobe Kapazität.</div><div class="mc"><canvas id="v2mc"></canvas></div></div></div>`);
    new Chart(document.getElementById("v2mc"),{type:"line",data:{labels:vo2Series.map(x=>x.d),datasets:[{label:"VO₂max",data:vo2Series.map(x=>x.v),borderColor:"#2f6fb0",backgroundColor:"rgba(47,111,176,.12)",borderWidth:2,tension:.3,pointRadius:0,pointHoverRadius:4,fill:true}]},
      options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:"index"},plugins:{legend:{display:false}},
        scales:{y:{title:{display:true,text:"ml/kg/min"},grid:{color:GRID}},x:{grid:{display:false},ticks:{font:{size:10},autoSkip:true,maxTicksLimit:8}}}}});
    function close(){const m=document.getElementById("v2modal");if(m)m.remove();document.removeEventListener("keydown",esc);}
    function esc(e){if(e.key==="Escape")close();}
    document.addEventListener("keydown",esc);
    document.getElementById("v2modal").onclick=e=>{if(e.target.id==="v2modal")close();};
    document.getElementById("v2close").onclick=close;
  }
  document.querySelectorAll(".pred .p").forEach(el=>{const go=()=>openPredModal(+el.dataset.d,el.dataset.l);el.onclick=go;el.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();go();}};});
  {const v2el=document.querySelector(".vo2card");if(v2el){const go=()=>openVo2Modal();v2el.onclick=go;v2el.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();go();}};}}
  document.querySelectorAll("[data-eid]").forEach(el=>{const go=()=>openWorkoutModal(+el.dataset.eid);el.onclick=go;el.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();go();}};});
  document.querySelectorAll(".rt").forEach(b=>b.onclick=()=>{c2range=b.dataset.r;document.querySelectorAll(".rt").forEach(x=>x.classList.toggle("active",x===b));if(document.getElementById("tab-form").style.display!=="none")buildChart2();});
  {const wxEl=document.querySelector("[data-wx]");if(wxEl){const go=()=>openWeatherModal();wxEl.onclick=go;wxEl.onkeydown=e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();go();}};}}
  {const _chd=document.querySelector("details.chartsd");if(_chd)_chd.addEventListener("toggle",()=>{if(!_chd.open)return;const at=(document.querySelector(".tb.active")||{}).dataset;const t=at?at.t:"cons";const c=t==="form"?chart2:t==="vert"?chart3:t==="recov"?chart4:chart;if(c)c.resize();});}
}

function askKey(){
  document.body.insertAdjacentHTML("beforeend",`<div class="ov"><div class="box"><h3>API-Key</h3><p>Einmalig. Nur im Browser (localStorage), nie in der Datei.</p><label>Athlete-ID</label><input id="ka" value="${ATHLETE}"><label>API-Key</label><input id="kk" type="password" placeholder="intervals.icu → Settings → Developer"><button id="kb">Speichern & laden</button></div></div>`);
  document.getElementById("kb").onclick=()=>{const k=document.getElementById("kk").value.trim();if(!k)return;KEY=k;localStorage.setItem("loop_icu_key",k);document.querySelector(".ov").remove();render();};
}
(function(){const s=localStorage.getItem("compass_theme");if(s)document.documentElement.setAttribute("data-theme",s);
  const btn=document.getElementById("themebtn");
  const eff=()=>document.documentElement.getAttribute("data-theme")||(matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light");
  if(btn)btn.onclick=()=>{const n=eff()==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",n);localStorage.setItem("compass_theme",n);if(KEY)render();};})();
if(KEY)render(); else askKey();
</script>
